<div class="dashboard-container">
  
  <div *ngIf="isLoading" class="loading-state">
    <p>Loading classes...</p>
  </div>

  <div *ngIf="!isLoading && classrooms.length === 0" class="empty-state">
    <mat-icon class="empty-icon">school</mat-icon>
    <h2 class="empty-title">You don't have any classes yet</h2>
    <p class="empty-subtitle">Click the + button above to join or create a class.</p>
  </div>

  <div class="cards-grid" *ngIf="!isLoading && classrooms.length > 0">
    <div class="classroom-card" *ngFor="let cls of classrooms" [routerLink]="['/classroom', cls.id]">
      
      <!-- Card Header: Image + Text -->
      <div class="card-header" [style.background]="getBackgroundImage(cls.id)">
        <div class="header-text">
          <a class="class-title">{{ cls.className }}</a>
          <div class="class-section">{{ cls.section }}</div>
          <div class="class-teacher" *ngIf="!isTeacher(cls)">{{ cls.teacherName }}</div>
        </div>
      </div>

      <!-- Avatar overlaps the header and content. Only show if NOT teacher -->
      <div class="teacher-avatar-container" *ngIf="!isTeacher(cls)">
        <div class="teacher-avatar" [style.background-color]="getAvatarColor(cls.id + 1)">
          {{ cls.teacherName ? cls.teacherName.charAt(0).toUpperCase() : 'T' }}
        </div>
      </div>

      <!-- Main Content Area (Empty space) -->
      <div class="card-content">
      </div>

      <!-- Card Actions / Footer -->
      <div class="card-footer" (click)="$event.stopPropagation(); $event.preventDefault()">
        <ng-container *ngIf="isTeacher(cls)">
          <button mat-icon-button matTooltip="Open gradebook for this class" (click)="openGradebook(cls.id)">
            <mat-icon>trending_up</mat-icon>
          </button>
        </ng-container>
        <ng-container *ngIf="!isTeacher(cls)">
          <button mat-icon-button matTooltip="Open your work for this class" (click)="openGradebook(cls.id)">
            <mat-icon>assignment_ind</mat-icon>
          </button>
        </ng-container>

        <button mat-icon-button matTooltip="Open folder" (click)="openFolder(cls.id)">
          <mat-icon>folder_open</mat-icon>
        </button>

        <button mat-icon-button [matMenuTriggerFor]="cardMenu" (click)="$event.stopPropagation(); $event.preventDefault()">
          <mat-icon>more_vert</mat-icon>
        </button>

        <mat-menu #cardMenu="matMenu">
          <button mat-menu-item (click)="copyClass(cls)">
            <span>Copy</span>
          </button>
          <button mat-menu-item (click)="restoreClass(cls)">
            <span>Restore</span>
          </button>
          <button mat-menu-item (click)="deleteClass(cls)">
            <span>Delete</span>
          </button>
        </mat-menu>
      </div>
      
    </div>
  </div>
</div>
